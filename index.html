<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>数据结构算法可视化交互模拟器</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">DS</div>
        <div>
          <h1>算法模拟器</h1>
          <p>树 · 图 · 查找 · 排序</p>
        </div>
      </div>
      <div class="searchBox">
        <input id="filterInput" placeholder="搜索算法，例如 DFS / 快排" />
      </div>
      <nav id="algoList" class="algoList"></nav>
    </aside>

    <main class="workspace">
      <section class="topbar">
        <div class="titleBlock">
          <div id="category" class="category">实验四</div>
          <h2 id="title">二叉树递归建树</h2>
          <p id="subtitle">从先序文件记录一步步创建二叉链表</p>
        </div>
        <div id="complexity" class="complexityCard">复杂度：O(n)</div>
        <div class="status">
          <button id="codeFab" class="codeFab" title="打开核心代码">展示代码</button>
          <span id="stepCount">0 / 0</span>
        </div>
      </section>

      <section class="content">
        <div class="visualPanel">
          <div id="visualSummary" class="visualGuide visualSummary"></div>
          <div id="visualGuide" class="visualGuide"></div>
          <div id="visual" class="visual"></div>
          <section class="controls">
            <button id="resetBtn" class="ghostBtn" title="回到第一步">↺ 重置</button>
            <button id="prevBtn" class="ghostBtn" title="回退一步">← 上一步</button>
            <button id="playBtn" class="primaryBtn" title="自动播放">▶ 播放</button>
            <button id="nextBtn" class="accentBtn" title="前进一步">下一步 →</button>
            <label class="speed">速度
              <input id="speedInput" type="range" min="250" max="1800" value="850" step="50" />
            </label>
          </section>
          <section id="paramPanel" class="paramPanel"></section>
        </div>
        <aside class="explainPanel">
          <h3>步骤轨迹</h3>
          <div id="stepHistory" class="stepHistory"></div>
          <h3>当前步骤</h3>
          <p id="stepText">选择一个算法开始。</p>
          <h3>变量状态</h3>
          <div id="stateText" class="stateText"></div>
          <h3>学习提示</h3>
          <p id="defenseText"></p>
        </aside>
      </section>

      <section class="knowledgePanel">
        <div class="knowledgeHeader">
          <h3 id="knowledgeTitle">相关知识点讲解</h3>
          <span>向下滚动阅读，内容跟随左侧算法切换</span>
        </div>
        <div id="knowledgeBody" class="knowledgeBody"></div>
      </section>
    </main>
  </div>

  <section id="codePanel" class="codePanel" aria-hidden="true">
    <div class="codeDialog">
      <div class="codeHeader">
        <h3>核心代码 / 伪代码</h3>
        <div class="codeTools">
          <span id="hint">高亮行会跟随当前步骤变化</span>
          <button id="codeClose" title="关闭代码">关闭</button>
        </div>
      </div>
      <div id="codeBox"></div>
    </div>
  </section>
  <script src="./app.js?v=20260624-2"></script>
</body>
</html>
